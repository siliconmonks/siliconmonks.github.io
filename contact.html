<main class="contact-page">
  <section class="contact-panel">
    <div class="contact-form-area">
      <p class="section-kicker">~/contact</p>
      <h1>Contact us</h1>
      <form class="contact-form" action="https://formspree.io/f/xdabadze" method="POST">
        <input type="hidden" name="_subject" value="New message from Silicon Monks blog">
        <label for="name">Your Name</label>
        <input id="name" name="name" type="text" placeholder="Your name" required>
        
        <label for="email">Your Email Address</label>
        <input id="email" name="email" type="email" placeholder="name@example.com" required>
        
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Tell us what you want to discuss" required></textarea>

        <button type="submit">Submit</button>
      </form>
    </div>

    <aside class="contact-info">
      <img src="images/silicon-monks-img.png" alt="Silicon Monks logo" class="contact-logo">

      <div>
        <h2>Silicon Monks</h2>
        <p>VLSI, semiconductor design, verification, RTL, layout, and hardware intuition.</p>
      </div>

      <div class="contact-lines">
        <a href="https://www.linkedin.com/company/silicon-monks/" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-linkedin-in"></i>
          LinkedIn
        </a>

        <a href="https://www.instagram.com/siliconmonks/" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-instagram"></i>
          Instagram
        </a>

        <a href="https://x.com/siliconmonks" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-x-twitter"></i>
          X
        </a>
      </div>
    </aside>
  </section>
</main>
